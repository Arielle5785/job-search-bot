name: Job Search Bot
on:
  schedule:
    - cron: "0 5 * * 0-5" # 08:00 Israel time
    - cron: "0 9 * * 0-5" # 12:00 Israel time
    - cron: "0 14 * * 0-5" # 17:00 Israel time
    - cron: "0 18 * * 0-5" # 21:00 Israel time
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keep workflow active
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          echo "Last run: $(date)" > .github/last_run.txt
          git add .github/last_run.txt
          git diff --staged --quiet || git commit -m "chore: keepalive [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore seen-jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs_cache_*.json
          key: job-cache-${{ github.run_id }}
          restore-keys: job-cache-
      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv selenium webdriver-manager anthropic psycopg2-binary
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Run bot
        run: python job_search_automation.py
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # USERS_JSON: ${{ secrets.USERS_JSON }} — replaced by Neon DB
